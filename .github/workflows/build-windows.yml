name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg
        run: choco install ffmpeg-full -y

      - name: Copy ffmpeg binaries to project root
        shell: pwsh
        run: |
          $ffmpeg = (Get-Command ffmpeg).Source
          $ffprobe = (Get-Command ffprobe).Source
          Copy-Item $ffmpeg ffmpeg.exe
          Copy-Item $ffprobe ffprobe.exe

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build (PyInstaller + write NSI script)
        run: python build_windows.py --no-bundle-model --skip-nsis

      - name: Package with NSIS
        shell: pwsh
        run: |
          # Locate makensis — choco shim, then common install paths
          $candidates = @(
            "C:\ProgramData\chocolatey\bin\makensis.exe",
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          }
          if (-not $makensis) { throw "makensis not found — NSIS install may have failed" }
          Write-Host "Using makensis at: $makensis"

          # Confirm dist bundle exists before packaging
          Write-Host "--- dist directory ---"
          Get-ChildItem dist\SmolVLMHighlighter -ErrorAction Stop | Select-Object -First 20 | Format-Table Name, Length -AutoSize

          # Run NSIS and propagate exit code
          & $makensis /V2 installer\setup.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmolVLMHighlighter-Setup
          path: installer/SmolVLMHighlighter_Setup.exe
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/SmolVLMHighlighter_Setup.exe
          generate_release_notes: true
